name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 1. 签出你的代码和 Excel 表格
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 直接调用官方预装好的、绝对不会出错的封装打包环境
      - name: Build APK inside Stable Docker Container
        uses: kivy/buildozer-action@master
        with:
          command: buildozer -v android debug
          repository_root: .

      # 3. 上传最终生成的安装包
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: My-Android-App
          path: .buildozer/android/platform/build-armeabi-v7a_arm64-v8a/dists/deliveryapp/build/outputs/apk/debug/*.apk
